{{- $tasks := dict "expiry-warn" .Values.cronjobs.expiryWarn "auto-renew" .Values.cronjobs.autoRenew "deliver" .Values.cronjobs.deliver -}}
{{- range $name, $cfg := $tasks }}
{{- if $cfg.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "certheim.fullname" $ }}-{{ $name }}
  labels:
    {{- include "certheim.labels" $ | nindent 4 }}
spec:
  schedule: {{ $cfg.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "certheim.selectorLabels" $ | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          {{- with $.Values.podSecurityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "certheim.serviceAccountName" $ }}
          {{- with $.Values.image.pullSecrets }}
          imagePullSecrets: {{- toYaml . | nindent 12 }}
          {{- end }}
          # Co-locate with the app pod so it can share the (RWO) data volume on
          # the SQLite backend; a no-op constraint on Postgres.
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    topologyKey: kubernetes.io/hostname
                    labelSelector:
                      matchLabels:
                        {{- include "certheim.selectorLabels" $ | nindent 24 }}
          containers:
            - name: {{ $name }}
              image: {{ include "certheim.image" $ }}
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              {{- with $.Values.securityContext }}
              securityContext: {{- toYaml . | nindent 16 }}
              {{- end }}
              args: ["cron", "{{ $name }}"]
              env:
                {{- include "certheim.appEnv" $ | nindent 16 }}
              volumeMounts:
                - name: db
                  mountPath: /var/lib/certheim
                - name: data
                  mountPath: /var/opt/certheim
                {{- if eq (include "certheim.needSecretFiles" $) "true" }}
                - name: secret-files
                  mountPath: /etc/certheim/secret
                  readOnly: true
                {{- end }}
          volumes:
            {{- if eq (include "certheim.needSecretFiles" $) "true" }}
            - name: secret-files
              secret:
                secretName: {{ include "certheim.secretName" $ }}
                items:
                  {{- if ne ($.Values.license | default "") "" }}
                  - key: license
                    path: license
                  {{- end }}
                  {{- if and $.Values.openbao.enabled (ne ($.Values.openbao.caCert | default "") "") }}
                  - key: openbao-ca.pem
                    path: openbao-ca.pem
                  {{- end }}
            {{- end }}
            {{- if $.Values.persistence.enabled }}
            - name: db
              persistentVolumeClaim:
                claimName: {{ include "certheim.fullname" $ }}-db
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "certheim.fullname" $ }}-data
            {{- else }}
            - name: db
              emptyDir: {}
            - name: data
              emptyDir: {}
            {{- end }}
{{- end }}
{{- end }}
