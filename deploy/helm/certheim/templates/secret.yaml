{{- /* Sensitive config the app reads from env / mounted files: license blob,
       OpenBao AppRole secret_id + CA, and (when not using an existing secret)
       the Postgres URL. Created only when at least one is set inline. */ -}}
{{- $needLicense := ne (.Values.license | default "") "" -}}
{{- $needOpenbao := and .Values.openbao.enabled (eq (.Values.openbao.existingSecret | default "") "") -}}
{{- $needCa := and .Values.openbao.enabled (ne (.Values.openbao.caCert | default "") "") -}}
{{- $needPg := and (eq .Values.db.backend "postgres") (eq (.Values.db.postgres.existingSecret | default "") "") (ne (.Values.db.postgres.url | default "") "") -}}
{{- if or $needLicense $needOpenbao $needCa $needPg -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "certheim.secretName" . }}
  labels:
    {{- include "certheim.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needLicense }}
  license: {{ .Values.license | quote }}
  {{- end }}
  {{- if $needOpenbao }}
  CERTHEIM_OPENBAO_ROLE_ID: {{ .Values.openbao.roleId | quote }}
  CERTHEIM_OPENBAO_SECRET_ID: {{ .Values.openbao.secretId | quote }}
  {{- end }}
  {{- if $needCa }}
  openbao-ca.pem: {{ .Values.openbao.caCert | quote }}
  {{- end }}
  {{- if $needPg }}
  CERTHEIM_DB_URL: {{ .Values.db.postgres.url | quote }}
  {{- end }}
{{- end -}}
