apiVersion: v1
kind: Service
metadata:
  name: {{ include "certheim.fullname" . }}
  labels:
    {{- include "certheim.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "certheim.selectorLabels" . | nindent 4 }}
  ports:
    - name: web
      port: {{ .Values.service.port }}
      targetPort: web
