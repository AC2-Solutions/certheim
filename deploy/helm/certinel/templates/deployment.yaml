apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certinel.fullname" . }}
  labels:
    {{- include "certinel.labels" . | nindent 4 }}
spec:
  # SQLite is single-writer: force one replica unless on Postgres.
  replicas: {{ if eq .Values.db.backend "postgres" }}{{ .Values.replicaCount }}{{ else }}1{{ end }}
  strategy:
    type: {{ if eq .Values.db.backend "postgres" }}RollingUpdate{{ else }}Recreate{{ end }}
  selector:
    matchLabels:
      {{- include "certinel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "certinel.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "certinel.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Stage the static frontend (baked into the app image) into a shared
        # volume the nginx sidecar serves.
        - name: copy-frontend
          image: {{ include "certinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "mkdir -p /static/csr && cp -r /var/www/csr/. /static/csr/"]
          volumeMounts:
            - name: static
              mountPath: /static
      containers:
        - name: app
          image: {{ include "certinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["web"]
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "certinel.appEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 5002
          livenessProbe:
            httpGet: { path: /api/health, port: 5002 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /api/health, port: 5002 }
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: db
              mountPath: /var/lib/certinel
            - name: data
              mountPath: /var/opt/certinel
            {{- if or (ne (.Values.license | default "") "") (and .Values.openbao.enabled (ne (.Values.openbao.caCert | default "") "")) }}
            - name: secret-files
              mountPath: /etc/certinel/secret
              readOnly: true
            {{- end }}
        - name: nginx
          image: {{ .Values.nginx.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: web
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
          volumeMounts:
            - name: static
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: static
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: {{ include "certinel.fullname" . }}-nginx
        {{- if or (ne (.Values.license | default "") "") (and .Values.openbao.enabled (ne (.Values.openbao.caCert | default "") "")) }}
        - name: secret-files
          secret:
            secretName: {{ include "certinel.secretName" . }}
            items:
              {{- if ne (.Values.license | default "") "" }}
              - key: license
                path: license
              {{- end }}
              {{- if and .Values.openbao.enabled (ne (.Values.openbao.caCert | default "") "") }}
              - key: openbao-ca.pem
                path: openbao-ca.pem
              {{- end }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: db
          persistentVolumeClaim:
            claimName: {{ include "certinel.fullname" . }}-db
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "certinel.fullname" . }}-data
        {{- else }}
        - name: db
          emptyDir: {}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
