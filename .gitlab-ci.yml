# .gitlab-ci.yml - syntax gates for the certinel repo.
#
# Runs on a self-hosted shell runner (tag: shell).
# The bare `python3` on a RHEL 8 runner is 3.6, which predates the walrus
# operator (:=) used in the backend - so lint explicitly against 3.9, the
# AppStream interpreter that matches the app's venv runtime. If your runner
# has 3.11 instead, change PYBIN below.

variables:
  PYBIN: "python3.9"

# Run one pipeline per branch push (and per tag) — NOT merge-request pipelines.
# Without this, adding the rules-based `release` job made GitLab create empty
# merge_request_event pipelines and skip the branch pipeline (0 jobs ran).
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

stages: [lint, test, release, propagate]

default:
  tags: [shell]

python-syntax:
  stage: lint
  script:
    - $PYBIN --version
    - $PYBIN -m py_compile backend/*.py
    # Undefined-name gate: py_compile does NOT catch NameErrors (e.g. a blueprint
    # using sqlite3/Path without importing it). pyflakes does. Fail ONLY on
    # "undefined name" (unused-import noise is ignored). Best-effort install.
    - |
      if $PYBIN -m pip install --quiet --user pyflakes 2>/dev/null || pip3 install --quiet --user pyflakes 2>/dev/null; then
        if $PYBIN -m pyflakes backend/*.py 2>&1 | grep -E "undefined name"; then
          echo "FAIL: undefined name(s) above — add the missing import."; exit 1
        fi
        echo "pyflakes: no undefined names"
      else
        echo "WARN: pyflakes unavailable; skipped undefined-name check"
      fi
    - echo "python OK"

bash-syntax:
  stage: lint
  script:
    - bash -n helper/certinel_helper.sh
    - for f in helper/certinel_helper.d/*.sh; do bash -n "$f"; done
    - bash -n deploy.sh gather.sh tools/certinel-backup.sh tools/release.sh install/online-install.sh
    - echo "bash OK"

js-syntax:
  stage: lint
  script:
    # app.js is split into ordered pieces; each must parse on its own.
    - for f in frontend/app.*.js; do node --check "$f"; done
    - echo "js OK"

smoke-tests:
  stage: test
  # Hard gate: it passed on the runner, and it's how we keep the blueprint
  # split honest (every extraction must keep all routes registered + working).
  script:
    # Endpoint smoke net (route registration + auth + shapes). Catches a
    # dropped/broken route from refactors (e.g. the planned blueprint split).
    - $PYBIN -m venv /tmp/cienv
    - /tmp/cienv/bin/pip install -q -r requirements.txt pytest
    - /tmp/cienv/bin/python -m pytest tests/test_smoke.py -q

# Same smoke suite, but against the PostgreSQL backend (db.py abstraction) so the
# dialect shim + DDL translation stay honest. The shared runner is a SHELL
# executor (no Docker `services:`), so we bring up an ephemeral, user-local
# Postgres with initdb/pg_ctl on a unix socket (no root, no port) for the job,
# then tear it down. Requires `postgresql-server` on the runner host.
smoke-tests-postgres:
  stage: test
  variables:
    PGHOME: "/tmp/certinel-pg-$CI_JOB_ID"
  script:
    - command -v initdb >/dev/null || { echo "postgresql-server not installed on the runner"; exit 1; }
    - rm -rf "$PGHOME"; mkdir -p "$PGHOME/sock"
    - initdb -D "$PGHOME/data" -U certinel --auth=trust -E UTF8 >/dev/null
    # -l detaches the daemon's stdio to a logfile; without it the backgrounded
    # postgres holds the job's stdout pipe open and the shell runner hangs
    # waiting for it long after the tests finish.
    - pg_ctl -D "$PGHOME/data" -l "$PGHOME/pg.log" -o "-c listen_addresses='' -k $PGHOME/sock" -w start
    - createdb -h "$PGHOME/sock" -U certinel certinel
    - $PYBIN -m venv /tmp/cienv-pg
    - /tmp/cienv-pg/bin/pip install -q -r requirements.txt -r requirements-postgres.txt pytest
    - CSR_DB_URL="postgresql://certinel@/certinel?host=$PGHOME/sock" /tmp/cienv-pg/bin/python -m pytest tests/test_smoke.py -q
  after_script:
    - pg_ctl -D "/tmp/certinel-pg-$CI_JOB_ID/data" stop -m immediate -t 10 2>/dev/null || true
    - pkill -9 -f "/tmp/certinel-pg-$CI_JOB_ID" 2>/dev/null || true
    - rm -rf "/tmp/certinel-pg-$CI_JOB_ID"

# NOTE: the fleet cert-scan playbook is intentionally NOT linted here -
# it lives in the /var/automation repo and is covered by that project's
# pipeline. Tracking a copy in this repo would create two sources of truth.

# Automated semantic-version releases. On a push to the default branch, compute
# the next version from Conventional Commit prefixes since the last v* tag
# (feat -> minor, fix/perf/refactor/build/revert -> patch, `!`/BREAKING ->
# major), regenerate VERSION + CHANGELOG.md + RELEASE-NOTES-vX.Y.Z.md, then
# commit + tag + push. Requires a CI/CD variable RELEASE_TOKEN = a project
# access token with `write_repository` (and push rights to the protected
# default branch). If unset, the job is a safe no-op. See RELEASING.md.
release:
  stage: release
  rules:
    - if: '($CI_COMMIT_BRANCH == "Community" || $CI_COMMIT_BRANCH == "Commercial" || $CI_COMMIT_BRANCH == "Government") && $CI_PIPELINE_SOURCE == "push"'
  variables:
    GIT_DEPTH: "0"          # full history + tags needed for `git describe`
  script:
    - |
      set -e
      if [ -z "${RELEASE_TOKEN:-}" ]; then
        echo "RELEASE_TOKEN not set — skipping auto-release (set a write_repository token to enable)."
        exit 0
      fi
      # Per-edition release: each branch (Community/Commercial/Government) cuts its
      # OWN version line in its OWN tag namespace (community-v* / commercial-v* /
      # government-v*). The MAJOR is owned by Community only (see tools/release.sh):
      # a breaking change up-tier clamps to a minor. RELEASE_EDITION tells
      # release.sh which edition it is computing for.
      case "$CI_COMMIT_BRANCH" in
        Community)  export RELEASE_EDITION=community ;;
        Commercial) export RELEASE_EDITION=commercial ;;
        Government) export RELEASE_EDITION=government ;;
      esac
      PFX="$RELEASE_EDITION"
      git config user.email "release-bot@certinel.local"
      git config user.name  "release-bot"
      git remote set-url origin "https://oauth2:${RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      # Rapid back-to-back merges run a `release` job each. They race on the push
      # to the protected default branch — the loser sees a non-fast-forward and
      # used to fail the pipeline. Retry: re-sync to the latest tip, recompute the
      # version (which now sees the other merge's commits AND its release tag), and
      # re-push. The loser typically recomputes to "none" and no-ops cleanly.
      ver=""
      for attempt in 1 2 3 4 5; do
        git fetch --quiet --tags origin "$CI_COMMIT_BRANCH" || true
        git reset --hard "origin/${CI_COMMIT_BRANCH}"
        ver="$(bash tools/release.sh)"
        if [ "$ver" = "none" ]; then
          echo "No release-worthy commits since the last ${PFX} tag — nothing to cut."
          exit 0
        fi
        echo "Cutting ${PFX}-v$ver (attempt $attempt)"
        # Commit only this edition's files. release.sh also mirrors the community
        # line into root VERSION (community is the only writer of root VERSION, so
        # it never diverges across editions). RELEASE-NOTES-${PFX}-v$ver.md is
        # generated for the GitLab Release page but gitignored, never committed.
        git add "editions/${PFX}.version" "editions/${PFX}.changelog.md" VERSION
        git commit -m "release: ${PFX}-v$ver [skip ci]"
        git tag -a "${PFX}-v$ver" -m "Certinel ${PFX}-v$ver"
        if git push origin "HEAD:${CI_COMMIT_BRANCH}" && git push origin "${PFX}-v$ver"; then
          echo "Pushed ${PFX}-v$ver on attempt $attempt"
          break
        fi
        echo "Push raced (non-fast-forward); re-syncing and retrying."
        git tag -d "${PFX}-v$ver" || true   # drop the local tag; recompute on the new tip
        ver=""
        sleep 3
      done
      if [ -z "$ver" ]; then
        echo "Could not cut a release after 5 attempts (persistent push contention)."
        exit 1
      fi
      # Create the GitLab Release object (tag + notes shown under Deploy>Releases).
      # Non-fatal: the tag is already pushed; the release object is secondary.
      # NOTE: this needs RELEASE_TOKEN to have the `api` scope - `write_repository`
      # is Git-over-HTTP only and CANNOT call the API (the POST 403s). The browser
      # User-Agent dodges the Cloudflare bot rule (1010) on API writes to the
      # public host. Print the HTTP status so a failure isn't silent.
      # Edition-scoped image/release tags. RELTAG is the immutable release tag
      # (e.g. commercial-v3.22.0); MOVING is the edition's rolling tag (commercial).
      # Community additionally owns the bare latest/slim tags for backward-compat.
      RELTAG="${PFX}-v$ver"
      MOVING="${PFX}"
      desc="$(python3 -c 'import json,sys; print(json.dumps(open(sys.argv[1]).read()))' "RELEASE-NOTES-${PFX}-v$ver.md")"
      rel_code="$(curl -sS -A "Mozilla/5.0" -o /tmp/rel-resp.json -w '%{http_code}' \
        -X POST -H "PRIVATE-TOKEN: ${RELEASE_TOKEN}" -H "Content-Type: application/json" \
        --data "{\"tag_name\":\"$RELTAG\",\"name\":\"$RELTAG\",\"description\":$desc}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || echo 000)"
      if [ "$rel_code" = "201" ]; then
        echo "GitLab Release $RELTAG created"
      else
        echo "warn: GitLab Release object not created (HTTP $rel_code; tag $RELTAG is pushed regardless):"
        head -c 300 /tmp/rel-resp.json || true; echo
      fi
      # Build + publish the OCI images (UBI9 default + slim) for the cut release
      # to Docker Hub — the canonical public registry for Certinel. (We publish to
      # Docker Hub, not the internal GitLab registry, because the latter is
      # Cloudflare-proxied and CF rejects the >100MB UBI9 layer with HTTP 413.)
      # Build with rootless BuildKit (buildctl-daemonless.sh, provisioned on the
      # runner by the ansible gitlab_runner_host role) so each image carries
      # SBOM + SLSA provenance attestations, which Docker Scout's supply-chain
      # checks read and buildah cannot emit. /usr/local/bin is not on the runner's
      # default PATH. Auth via the instance-level DOCKERHUB_USERNAME/_TOKEN.
      # Non-fatal: a build hiccup must never undo the pushed tag. Falls back to
      # buildah (no attestations) if BuildKit isn't present on the runner.
      HUB_IMAGE="docker.io/ac2solutions/certinel"
      # Compose the edition's tag set: always RELTAG + MOVING; community also
      # publishes the bare latest/slim so existing `:latest` pulls track the base.
      IMG_TAGS="$HUB_IMAGE:$RELTAG,$HUB_IMAGE:$MOVING"
      SLIM_TAGS="$HUB_IMAGE:$RELTAG-slim,$HUB_IMAGE:$MOVING-slim"
      if [ "$PFX" = community ]; then
        IMG_TAGS="$IMG_TAGS,$HUB_IMAGE:latest"; SLIM_TAGS="$SLIM_TAGS,$HUB_IMAGE:slim"
      fi
      export PATH="/usr/local/bin:$PATH"
      # BuildKit state lives OUTSIDE $CI_PROJECT_DIR: rootless buildkitd writes
      # runc-overlayfs snapshots owned by remapped subuids that a plain rm (and
      # GitLab's next-pipeline `git clean`) can't delete — if it sat in the build
      # dir, the following pipeline's get_sources would fail. Cleaned via
      # `buildah unshare` (enters a userns where the subuids map back).
      BK="${TMPDIR:-/tmp}/certinel-bk-${CI_JOB_ID}"
      if [ -n "${DOCKERHUB_TOKEN:-}" ] && command -v buildctl-daemonless.sh >/dev/null 2>&1; then
        ( set -e
          mkdir -p "$BK/run" "$BK/home" "$BK/docker"
          export HOME="$BK/home" XDG_RUNTIME_DIR="$BK/run" TMPDIR="$BK" \
                 DOCKER_CONFIG="$BK/docker" BUILDKITD_FLAGS="--oci-worker-no-process-sandbox"
          a=$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 -w0)
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' "$a" > "$DOCKER_CONFIG/config.json"
          bk() { buildctl-daemonless.sh build --frontend dockerfile.v0 \
                   --local context="$CI_PROJECT_DIR" --local dockerfile="$CI_PROJECT_DIR" --opt filename=Containerfile \
                   --opt attest:sbom=true --opt attest:provenance=mode=max "$@"; }
          bk --output "type=image,\"name=$IMG_TAGS\",push=true"
          bk --opt build-arg:PYBASE=docker.io/library/python:3.12-slim \
             --output "type=image,\"name=$SLIM_TAGS\",push=true"
          echo "Published $HUB_IMAGE with SBOM + provenance attestations  tags: $IMG_TAGS,$SLIM_TAGS"
          # Mirror the same attested images into the entitled Certinel registry
          # (the license-server origin, over the LAN — bypasses Cloudflare's
          # 100MB body cap). Auth: the _mirror push credential on the portal's
          # token endpoint. registry.insecure: the origin is plain HTTP on the
          # LAN (TLS is terminated at the Cloudflare tunnel for customer pulls).
          if [ -n "${CERTINEL_MIRROR_PUSH_SECRET:-}" ]; then
            ( REG="192.168.201.19:5000"
              ma=$(printf '_mirror:%s' "$CERTINEL_MIRROR_PUSH_SECRET" | base64 -w0)
              python3 -c "import json;p='$DOCKER_CONFIG/config.json';d=json.load(open(p));d['auths']['$REG']={'auth':'$ma'};json.dump(d,open(p,'w'))"
              MREG_TAGS="$REG/certinel:$RELTAG,$REG/certinel:$MOVING"
              MREG_SLIM="$REG/certinel:$RELTAG-slim,$REG/certinel:$MOVING-slim"
              if [ "$PFX" = community ]; then MREG_TAGS="$MREG_TAGS,$REG/certinel:latest"; MREG_SLIM="$MREG_SLIM,$REG/certinel:slim"; fi
              bk --output "type=image,\"name=$MREG_TAGS\",push=true,registry.insecure=true"
              bk --opt build-arg:PYBASE=docker.io/library/python:3.12-slim \
                 --output "type=image,\"name=$MREG_SLIM\",push=true,registry.insecure=true"
              echo "Mirrored to entitled registry $REG (attested)" ) \
              || echo "note: entitled-registry mirror skipped/failed (Docker Hub publish still succeeded)"
          fi ) \
          || echo "warn: attested image publish failed (release $RELTAG still cut; rebuild manually)"
        buildah unshare -- rm -rf "$BK" 2>/dev/null || rm -rf "$BK" 2>/dev/null || true
      elif [ -n "${DOCKERHUB_TOKEN:-}" ] && command -v buildah >/dev/null 2>&1; then
        echo "note: BuildKit not on the runner — publishing without attestations (buildah)."
        ( set -e
          export XDG_RUNTIME_DIR="$CI_PROJECT_DIR/.xdg"; mkdir -p "$XDG_RUNTIME_DIR"
          export REGISTRY_AUTH_FILE="$CI_PROJECT_DIR/.auth.json"
          B="buildah --root $CI_PROJECT_DIR/.bstore --runroot $CI_PROJECT_DIR/.brun --storage-driver vfs"
          echo "$DOCKERHUB_TOKEN" | $B login -u "$DOCKERHUB_USERNAME" --password-stdin docker.io
          tflags=""; for t in $(echo "$IMG_TAGS" | tr ',' ' '); do tflags="$tflags -t $t"; done
          sflags=""; for t in $(echo "$SLIM_TAGS" | tr ',' ' '); do sflags="$sflags -t $t"; done
          $B bud --isolation chroot $tflags -f Containerfile .
          $B bud --isolation chroot --build-arg PYBASE=docker.io/library/python:3.12-slim \
                 $sflags -f Containerfile .
          for t in $(echo "$IMG_TAGS,$SLIM_TAGS" | tr ',' ' '); do $B push "$t"; done
          echo "Published $HUB_IMAGE  tags: $IMG_TAGS,$SLIM_TAGS" ) \
          || echo "warn: container image publish failed (release $RELTAG still cut; rebuild manually)"
        buildah unshare -- bash -c "rm -rf $CI_PROJECT_DIR/.bstore $CI_PROJECT_DIR/.brun $CI_PROJECT_DIR/.xdg $CI_PROJECT_DIR/.auth.json" 2>/dev/null || true
      else
        echo "note: DOCKERHUB_TOKEN unset or no builder — skipping image publish for $RELTAG."
      fi
      # Build + publish the offline installer tarball (Community self-hosted +
      # air-gapped — one ~4MB artifact, identical for every edition; the portal
      # injects the per-customer license at download time) to the licenses
      # portal, which serves it on-domain via www.ac2certinel.com/download.
      # make-offline-bundle.sh reads the (already-bumped) VERSION file and emits
      # certinel-offline-$ver.tar.gz in the CWD. Gated on the upload secret (CI
      # var); non-fatal, like the image publish. </dev/null guards against any
      # stray read blocking the unattended job.
      # The offline installer tarball is the Community/base build (one artifact,
      # license injected per-customer at download time), so only the Community
      # release publishes it — higher editions must not overwrite it.
      if [ "$PFX" = community ] && [ -n "${CERTINEL_RELEASE_UPLOAD_SECRET:-}" ]; then
        ( set -e
          bash make-offline-bundle.sh </dev/null
          bundle="certinel-offline-$ver.tar.gz"
          sha="$(sha256sum "$bundle" | cut -d' ' -f1)"
          curl -fsS -X POST "https://licenses.ac2.lan/api/v1/certinel/releases" \
            -H "Authorization: Bearer $CERTINEL_RELEASE_UPLOAD_SECRET" \
            -F "version=$ver" -F "sha256=$sha" -F "bundle=@$bundle"
          echo "Published offline bundle $bundle ($sha) to the licenses portal" ) \
          || echo "warn: offline-bundle publish failed (release $RELTAG still cut)"
        rm -f "certinel-offline-$ver.tar.gz" "certinel-offline-$ver.tar.gz.sha256" 2>/dev/null || true
      elif [ "$PFX" = community ]; then
        echo "note: CERTINEL_RELEASE_UPLOAD_SECRET unset — skipping offline-bundle publish for $RELTAG."
      else
        echo "note: offline bundle is published from Community only — skipping for $RELTAG."
      fi
      echo "Released $RELTAG"

# ---------------------------------------------------------------------------
# Bottom-up edition propagation.
#
# The editions stack: Community (base) -> Commercial -> Government. A change
# committed to a lower branch must flow UP so each higher edition inherits
# everything below it. This job opens (or reuses) a merge request from the
# branch that just changed into the next edition up; a human still merges it,
# so premium/edition-specific conflicts get reviewed. Premium code never flows
# DOWN (lower branches simply don't contain those files).
#
# Needs RELEASE_TOKEN (api scope). No token -> the step skips, harmless.
propagate-upstream:
  stage: propagate
  rules:
    - if: '$CI_COMMIT_BRANCH == "Community" || $CI_COMMIT_BRANCH == "Commercial"'
  allow_failure: true
  script:
    - |
      if [ -z "${RELEASE_TOKEN:-}" ]; then echo "RELEASE_TOKEN unset - skipping edition propagation."; exit 0; fi
      case "$CI_COMMIT_BRANCH" in
        Community)  TARGET=Commercial ;;
        Commercial) TARGET=Government ;;
        *) echo "no upstream edition for $CI_COMMIT_BRANCH"; exit 0 ;;
      esac
      API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
      EXISTING=$(curl -fsS -H "PRIVATE-TOKEN: ${RELEASE_TOKEN}" \
        "${API}?state=opened&source_branch=${CI_COMMIT_BRANCH}&target_branch=${TARGET}" \
        | python3 -c "import sys,json;d=json.load(sys.stdin);print(d[0]['iid'] if d else '')")
      if [ -n "$EXISTING" ]; then
        echo "Propagation MR !${EXISTING} (${CI_COMMIT_BRANCH} -> ${TARGET}) already open - it will include this commit."
        exit 0
      fi
      DESC="Automated bottom-up propagation: brings **${CI_COMMIT_BRANCH}** changes up into **${TARGET}** so the higher edition inherits everything below. Review for premium/edition-specific conflicts before merging."
      CODE=$(curl -sS -o /tmp/mr.json -w '%{http_code}' -X POST -H "PRIVATE-TOKEN: ${RELEASE_TOKEN}" -H "Content-Type: application/json" "${API}" \
        -d "{\"source_branch\":\"${CI_COMMIT_BRANCH}\",\"target_branch\":\"${TARGET}\",\"title\":\"Propagate ${CI_COMMIT_BRANCH} -> ${TARGET}\",\"description\":\"${DESC}\",\"reviewer_ids\":[1],\"remove_source_branch\":false}")
      if [ "$CODE" = "201" ]; then echo "Opened propagation MR ${CI_COMMIT_BRANCH} -> ${TARGET}.";
      else echo "MR create HTTP ${CODE} (often 'no diff' when ${TARGET} is already up to date):"; cat /tmp/mr.json; echo; fi
