# 30-csr.conf — CSR Dashboard nginx site.
#
# Reconstructed for the offline/STIG stand-up (the production copy lives only
# on nipat-pl-rcdn01 and was never committed to the repo). Drop-in for a
# dedicated server; on rcdn01 this content lives under /etc/nginx/rcdn01.d/
# and is `include`d from a server{} block. Here it is a self-contained server
# so a fresh VM serves the dashboard.
#
# PKI / CAC mTLS (PRODUCTION, manual — site-specific):
#   - Replace the self-signed server cert below with this site's server cert.
#   - Install the DoD CA bundle and set:
#         ssl_client_certificate /etc/pki/dod/dod-cas.pem;
#         ssl_verify_client      on;
#         ssl_verify_depth       3;
#     to ENFORCE CAC. Until the DoD CA bundle is present, this file uses
#     `ssl_verify_client optional_no_ca` so the box serves and the app falls
#     back to ip:<addr> identity (no admin rights) — see app.client_identity().

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # --- Server TLS (placeholder self-signed; replace with the site cert) ---
    ssl_certificate     /etc/pki/csr-dashboard/server.crt;
    ssl_certificate_key /etc/pki/csr-dashboard/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- CAC / client-cert mTLS ---
    # PRODUCTION: ssl_client_certificate <DoD CA bundle>; ssl_verify_client on;
    ssl_verify_client optional_no_ca;
    ssl_verify_depth  3;

    # Pass the verified client identity to the Flask app.
    # app.client_identity() trusts these ONLY when X-Client-Verify == SUCCESS.
    proxy_set_header X-Client-DN     $ssl_client_s_dn;
    proxy_set_header X-Client-Verify $ssl_client_verify;
    proxy_set_header X-Client-Serial $ssl_client_serial;

    # --- Static frontend at /csr/ ---
    location = / { return 302 /csr/; }

    location /csr/ {
        alias /var/www/csr/;
        index index.html;
        try_files $uri $uri/ /csr/index.html;
    }

    # --- API: /csr/api/... -> backend /api/... (strip the /csr prefix) ---
    location /csr/api/ {
        proxy_pass http://127.0.0.1:5002/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Client-DN       $ssl_client_s_dn;
        proxy_set_header X-Client-Verify   $ssl_client_verify;
        proxy_set_header X-Client-Serial   $ssl_client_serial;
        proxy_read_timeout 120s;
    }

    client_max_body_size 1m;
}
