# ---------------------------------------------------------------------------
#   Certinel (static frontend + API proxy to gunicorn 127.0.0.1:5002)
#   Included into the certinel-host server block.
#   mTLS / client-cert verification is configured at the SERVER level in
#   conf.d/certinel-host.conf - NOT here. This file is location blocks only.
#
#   NOTE: uses `root /var/www` (not alias). With root, a request for
#   /csr/<path> maps to /var/www/csr/<path> and try_files resolves correctly.
#   `alias` + bare `try_files index.html` resolves against the server root,
#   not the alias, which 404s to <default-root>/csr - avoid it.
# ---------------------------------------------------------------------------

# --- Static frontend at /csr/ ----------------------------------------------
location = /csr/ {
    root /var/www;
    try_files /csr/index.html =404;
}
location /csr/ {
    root /var/www;
    try_files $uri $uri/ /csr/index.html =404;
}

# --- API proxy at /csr/api/ -> gunicorn ------------------------------------
location /csr/api/ {
    proxy_pass http://127.0.0.1:5002/api/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CAC identity passed to the app (backend authenticates on these).
    proxy_set_header X-Client-DN     $ssl_client_s_dn;
    proxy_set_header X-Client-Verify $ssl_client_verify;
    proxy_set_header X-Client-Serial $ssl_client_serial;
}

# --- Premium endpoints served for EXTERNAL clients on non-/api paths --------
# The ACME server (RFC 8555 — certbot/cert-manager/acme.sh), Prometheus
# /metrics, and SCIM 2.0 (Okta/Entra/Ping) live at the app's own top-level
# paths, so they must proxy to gunicorn, not resolve as /csr/ static files.
# Absent/disabled features just return 404/disabled from the app.
location /acme/ {
    proxy_pass http://127.0.0.1:5002/acme/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location = /metrics {
    proxy_pass http://127.0.0.1:5002/metrics;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
}
location /scim/ {
    proxy_pass http://127.0.0.1:5002/scim/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
