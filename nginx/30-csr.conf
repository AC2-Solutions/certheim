# 30-csr.conf — CSR Dashboard nginx LOCATION FRAGMENT.
#
# This file is `include`d INSIDE an existing server{} block. On rcdn01:
#   conf.d/nipat-pl-rcdn01.conf  (server{} : TLS + CAC mTLS + include)
#     └─ include rcdn01.d/*.conf  ← this fragment
# It must contain LOCATION blocks ONLY — no server{} wrapper, or nginx errors
# "server directive is not allowed here".
#
# TLS and CAC mTLS (ssl_certificate / ssl_verify_client / ssl_client_certificate
# / ssl_verify_depth) live at the SERVER level, NOT here. For a standalone or
# air-gapped box with no existing server block, the installer generates one
# automatically at conf.d/csr-dashboard.conf (listen 443 ssl + cert + the
# include) — see install/online-install.sh / the offline installer.

# Bare host root -> the app.
location = / { return 302 /csr/; }

# --- Static frontend at /csr/ ---
# Use `root` (NOT alias): /csr/<path> -> /var/www/csr/<path>. With `alias` a
# bare `try_files index.html` resolves against the default docroot and 404s to
# /usr/share/nginx/html.
location /csr/ {
    root /var/www;
    index index.html;
    try_files $uri $uri/ /csr/index.html;
}

# --- API: /csr/api/... -> backend /api/... (strip the /csr prefix) ---
location /csr/api/ {
    proxy_pass http://127.0.0.1:5002/api/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Verified client identity for the Flask app. app.client_identity() trusts
    # these ONLY when X-Client-Verify == SUCCESS (set by ssl_verify_client at
    # the server level); otherwise it falls back to ip:<addr>.
    proxy_set_header X-Client-DN       $ssl_client_s_dn;
    proxy_set_header X-Client-Verify   $ssl_client_verify;
    proxy_set_header X-Client-Serial   $ssl_client_serial;
    proxy_read_timeout 120s;
}

client_max_body_size 1m;
